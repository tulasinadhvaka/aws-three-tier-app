name: "AWS OIDC + ECR login"
description: "Assume the GitHub OIDC IAM role and log in to Amazon ECR. No stored secrets."

inputs:
  aws-region:
    description: "AWS region."
    required: true
  role-arn:
    description: "IAM role ARN to assume via GitHub OIDC."
    required: true

outputs:
  registry:
    description: "ECR registry hostname (account.dkr.ecr.region.amazonaws.com)."
    value: ${{ steps.ecr.outputs.registry }}

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@v2
