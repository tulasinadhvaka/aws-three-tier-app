# Thanos object-store configuration for S3.
# Copy the `config` block below into a file named `objstore.yml`, fill in bucket + region,
# then create the secret (objstore.yml is gitignored):
#
#   kubectl -n monitoring create secret generic thanos-objstore \
#     --from-file=objstore.yml=./objstore.yml
#
# Auth is via IRSA: the service account is annotated with an IAM role ARN that grants
# s3:GetObject/PutObject/DeleteObject/ListBucket on this bucket. No access_key/secret_key here.

type: S3
config:
  bucket: "my-thanos-metrics-<account-id>"
  endpoint: "s3.us-east-1.amazonaws.com"
  region: "us-east-1"
  # aws_sdk_auth: true tells Thanos to use the ambient AWS credential chain (IRSA),
  # instead of static keys in this file.
  aws_sdk_auth: true
  # Server-side encryption for blocks at rest.
  sse_config:
    type: "SSE-S3"
